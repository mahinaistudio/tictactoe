<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Tic Tac Toe</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f2f2f2;
    padding: 50px;
  }

  h1 {
    color: #333;
  }

  #room-container {
    margin-bottom: 20px;
  }

  input#room {
    padding: 8px;
    font-size: 16px;
    width: 150px;
  }

  button#join {
    padding: 8px 16px;
    font-size: 16px;
    cursor: pointer;
  }

  #turn {
    margin: 20px 0;
    font-weight: bold;
    font-size: 18px;
  }

  #board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    grid-template-rows: repeat(3, 100px);
    gap: 5px;
    justify-content: center;
  }

  .cell {
    background: white;
    border: 2px solid #333;
    font-size: 48px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: background 0.2s;
  }

  .cell:hover {
    background: #ddd;
  }

  #winner {
    margin-top: 20px;
    font-size: 20px;
    color: green;
  }
</style>
</head>
<body>

<h1>Multiplayer Tic Tac Toe</h1>

<div id="room-container">
  <input id="room" placeholder="Enter Room Code">
  <button id="join">Join Game</button>
</div>

<div id="turn"></div>

<div id="board"></div>

<div id="winner"></div>

<script>
let socket;
let symbol;
let turn;
let board = Array(9).fill(null);

// Join the room
document.getElementById('join').onclick = function() {
  const room = document.getElementById('room').value.trim();
  if (!room) return alert("Enter a room code!");

  socket = new WebSocket("wss://ttt-backend.mahin-aistudio.workers.dev/" + room);

  socket.onopen = () => console.log("Connected to room:", room);

  socket.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.type === "init") {
      symbol = data.symbol;
      turn = data.turn;
      board = data.board;
      render();
      updateTurn();
    }

    if (data.type === "update") {
      board = data.board;
      turn = data.turn;
      render();
      updateTurn();
      checkWinner();
    }
  };

  socket.onclose = () => console.log("Disconnected from room.");
};

// Render the board
function render() {
  const boardDiv = document.getElementById('board');
  boardDiv.innerHTML = "";
  board.forEach((cell, index) => {
    const div = document.createElement('div');
    div.className = "cell";
    div.textContent = cell || "";
    div.onclick = () => makeMove(index);
    boardDiv.appendChild(div);
  });
}

// Send move to server
function makeMove(index) {
  if (!socket || socket.readyState !== WebSocket.OPEN) return;
  if (board[index] !== null) return;
  if (symbol !== turn) return alert("Wait for your turn!");
  socket.send(JSON.stringify({move: index}));
}

// Update turn info
function updateTurn() {
  const turnDiv = document.getElementById('turn');
  turnDiv.textContent = (turn === symbol) ? "Your turn (" + symbol + ")" : "Opponent's turn";
}

// Check for winner
function checkWinner() {
  const lines = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  for (const [a,b,c] of lines) {
    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
      document.getElementById('winner').textContent = (board[a] === symbol ? "You win!" : "You lose!");
      return;
    }
  }

  if (board.every(cell => cell)) {
    document.getElementById('winner').textContent = "Draw!";
  } else {
    document.getElementById('winner').textContent = "";
  }
}
</script>

</body>
</html>
